<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brendava Tours & Travel Ltd.</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
        font-family:Arial, Helvetica, sans-serif;
        background:#F5F5DC;
    }

    .carousel-item{
        height:100vh;
        background-size:cover;
        background-position:center;
        position:relative;
    }

    .slide1{
        background:url("images/mountain.jpg") center/cover no-repeat;
    }

    .slide2{
        background:url("images/gorilla.jpg") center/cover no-repeat;
    }

    .slide3{
        background:url("images/rafting.jpg") center/cover no-repeat;
    }

    .slide4{
        background:url("images/airplane.jpg") center/cover no-repeat;
    }

    .slide5{
        background:url("images/safari.jpg") center/cover no-repeat;
    }

    .slide6{
        background:url("images/contact.jpg") center/cover no-repeat;
    }

    .overlay{
        position:absolute;
        inset:0;
        background:rgba(0,0,0,.55);
    }

    .slide-content{
        position:relative;
        z-index:2;
        color:#fff;
        height:100%;
        display:flex;
        flex-direction:column;
        justify-content:center;
        padding:6%;
    }

    .slide-content h1{
        font-size:60px;
        font-weight:bold;
        margin-bottom:20px;
    }

    .slide-content span{
        color:#ffc107;
    }

    .lead{
        font-size:22px;
        line-height:1.8;
        max-width:900px;
        margin-bottom:30px;
    }

    .service-box{
        background:rgba(255,255,255,.12);
        backdrop-filter:blur(8px);
        border:1px solid rgba(255,255,255,.25);
        border-radius:15px;
        padding:20px;
        height:100%;
        transition:.4s;
    }

    .service-box:hover{
        transform:translateY(-8px);
        background:rgba(255,255,255,.18);
    }

    .service-box h4{
        color:#ffc107;
        margin-bottom:12px;
        font-weight:bold;
    }

    .service-box p{
        color:white;
        font-size:16px;
        line-height:1.7;
    }

    .btn-custom{
        width:220px;
        padding:15px;
        border-radius:50px;
        font-size:20px;
    }

    @media(max-width:768px){

        .slide-content h1{
            font-size:38px;
        }

        .lead{
            font-size:18px;
        }

    }
        .slider-progress{
    position:absolute;
    top:0;
    left:0;
    width:0%;
    height:4px;
    background:#ffc107;
    z-index:1000;
}

    </style>

</head>

<body>

<div id="heroSlider"
class="carousel slide carousel-fade"
data-bs-ride="carousel"
data-bs-interval="5000">
<div class="slider-progress"></div>
<div class="carousel-inner">

<!-- HOME -->

<div class="carousel-item active slide1">

<div class="overlay"></div>

<div class="slide-content">

<h1>
Experience
<span>Unforgettable</span>
Moments
</h1>

<p class="lead">
Plan your travel with Brendava Tours & Travel Ltd.
We create unforgettable travel experiences across
Uganda and beyond with professionalism,
comfort and affordable pricing.
</p>

<a href="#" class="btn btn-warning btn-custom">
Book Now
</a>

</div>

</div>
    <script>
// ======================================
// Brendava Tours & Travel Slider Script
// ======================================

document.addEventListener("DOMContentLoaded", function () {

    const slider = document.getElementById("heroSlider");

    if (!slider) return;

    // Initialize Bootstrap Carousel
    const carousel = new bootstrap.Carousel(slider, {
        interval: 5000,
        ride: "carousel",
        pause: false,
        wrap: true,
        touch: true
    });

    // ----------------------------
    // Animate Active Slide
    // ----------------------------

    function animateSlide(slide) {

        const content = slide.querySelector(".slide-content");

        if (!content) return;

        content.style.opacity = "0";
        content.style.transform = "translateY(40px)";

        setTimeout(() => {
            content.style.transition = "all .8s ease";
            content.style.opacity = "1";
            content.style.transform = "translateY(0)";
        }, 150);

    }

    // Animate first slide
    const firstSlide = slider.querySelector(".carousel-item.active");

    animateSlide(firstSlide);

    // Animate every slide
    slider.addEventListener("slid.bs.carousel", function (event) {

        animateSlide(event.relatedTarget);

    });

    // ----------------------------
    // Pause On Hover
    // ----------------------------

    slider.addEventListener("mouseenter", function () {

        carousel.pause();

    });

    slider.addEventListener("mouseleave", function () {

        carousel.cycle();

    });

    // ----------------------------
    // Keyboard Navigation
    // ----------------------------

    document.addEventListener("keydown", function (event) {

        if (event.key === "ArrowLeft") {

            carousel.prev();

        }

        if (event.key === "ArrowRight") {

            carousel.next();

        }

    });

    // ----------------------------
    // Touch Swipe (Extra Support)
    // ----------------------------

    let touchStartX = 0;
    let touchEndX = 0;

    slider.addEventListener("touchstart", function (event) {

        touchStartX = event.changedTouches[0].screenX;

    });

    slider.addEventListener("touchend", function (event) {

        touchEndX = event.changedTouches[0].screenX;

        if (touchEndX < touchStartX - 50) {

            carousel.next();

        }

        if (touchEndX > touchStartX + 50) {

            carousel.prev();

        }

    });

    // ----------------------------
    // Optional Progress Bar
    // ----------------------------

    const progressBar = document.querySelector(".slider-progress");

    if (progressBar) {

        function startProgress() {

            progressBar.style.transition = "none";
            progressBar.style.width = "0%";

            setTimeout(() => {

                progressBar.style.transition = "width 5s linear";
                progressBar.style.width = "100%";

            }, 50);

        }

        startProgress();

        slider.addEventListener("slide.bs.carousel", function () {

            startProgress();

        });

    }

    // ----------------------------
    // Console Message
    // ----------------------------

    console.log("Brendava Tours & Travel Slider Loaded Successfully");

});
</script>
