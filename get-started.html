<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Get Started - Brendava Tours & Travel</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<style>
body{
    margin:0;
    font-family:Inter, sans-serif;
    background:#f5f1e6;
    color:#333;
}

/* HEADER */
header{
    background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
    url('IMG_0566.jpeg');
    background-size:cover;
    background-position:center;
    height:70vh;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    color:white;
}

nav{
    display:flex;
    justify-content:space-between;
    padding:20px 40px;
}

.home-btn{background:#25D366;color:white;padding:10px 18px;border-radius:8px;text-decoration:none;font-weight:700;}
.get-started{background:#0F766E;color:white;padding:10px 18px;border-radius:8px;text-decoration:none;font-weight:700;}

.hero{text-align:center;margin-bottom:60px;}
.hero h1{font-size:48px;font-weight:800;}
.hero p{font-size:18px;margin-top:10px;}

/* FORM */
.booking{
    max-width:1000px;
    margin:50px auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

form{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

input, select, textarea{
    padding:12px;
    border:1px solid #ddd;
    border-radius:8px;
}

textarea{grid-column:span 2;}

button{
    grid-column:span 2;
    padding:14px;
    background:#0F766E;
    color:white;
    font-size:16px;
    font-weight:700;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

button:hover{background:#115E59;}

/* POPUP */
#popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#0F766E;
color:white;
padding:20px 30px;
border-radius:10px;
display:none;
font-weight:bold;
z-index:9999;
}
</style>
</head>

<body>

<header>
<nav>
    <a href="index.html" class="home-btn">⬅ Go Home</a>
    <a href="#" class="get-started">Get Started</a>
</nav>

<div class="hero">
    <h1>GET STARTED</h1>
    <p id="changingText">DISCOVER EAST AFRICA</p>
</div>
</header>

<section class="booking">
<h2>BOOK YOUR SAFARI</h2>

<form id="bookingForm">

<input type="text" id="name" placeholder="Full Name" required>
<input type="email" id="email" placeholder="Email" required>
<input type="text" id="phone" placeholder="Phone" required>
<input type="text" id="country" placeholder="Country">
<input type="text" id="destination" placeholder="Destination">
<input type="date" id="arrival">
<input type="date" id="departure">
<input type="number" id="clients" placeholder="Clients">
<input type="number" id="days" placeholder="Days">

<select id="parks" multiple style="grid-column:span 2;">
    <option>Maasai Mara</option>
    <option>Serengeti</option>
    <option>Queen Elizabeth</option>
    <option>Murchison Falls</option>
    <option>Bwindi</option>
    <option>Kidepo</option>
</select>

<textarea id="message" placeholder="Message"></textarea>

<button type="submit">SEND BOOKING</button>

</form>
</section>

<div id="popup">Booking Sent Successfully!</div>

<script type="module">

// TEXT CHANGER
const texts = [
"DISCOVER EAST AFRICA",
"EXPLORE WILDLIFE",
"LUXURY SAFARIS",
"YOUR JOURNEY STARTS HERE"
];

let i = 0;
setInterval(() => {
i = (i + 1) % texts.length;
document.getElementById("changingText").innerText = texts[i];
}, 4000);

// EMAILJS INIT
emailjs.init("pA1qeAlZDgevk8-It");


// FIREBASE IMPORTS
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


// FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "YOUR_API_KEY_HERE",
  authDomain: "brendava-tours-and-travel.firebaseapp.com",
  projectId: "brendava-tours-and-travel",
  storageBucket: "brendava-tours-and-travel.firebasestorage.app",
  messagingSenderId: "732703885570",
  appId: "1:732703885570:web:3011a3989d5fe36eb69a1b",
  measurementId: "G-ZC356HMW9C"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


// FORM SUBMIT
const form = document.getElementById("bookingForm");
const popup = document.getElementById("popup");

form.addEventListener("submit", async (e) => {
e.preventDefault();

const data = {
name: document.getElementById("name").value,
email: document.getElementById("email").value,
phone: document.getElementById("phone").value,
country: document.getElementById("country").value,
destination: document.getElementById("destination").value,
arrival: document.getElementById("arrival").value,
departure: document.getElementById("departure").value,
clients: document.getElementById("clients").value,
days: document.getElementById("days").value,
parks: [...document.getElementById("parks").selectedOptions].map(o => o.value).join(", "),
message: document.getElementById("message").value
};

try {

// SAVE TO FIREBASE
await addDoc(collection(db, "bookings"), {
  ...data,
  createdAt: new Date()
});

// SEND EMAIL
await emailjs.send(
"service_1hlp5ii",
"template_vs01t7d",
data
);

// POPUP
popup.style.display = "block";
setTimeout(() => popup.style.display = "none", 3000);

form.reset();

} catch (err) {
console.error(err);
alert("Booking failed. Try again.");
}

});

</script>

</body>
</html>
