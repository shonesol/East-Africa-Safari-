<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Brendava Admin Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{background:#f4f7fa;}

:root{
--primary:#0f766e;
--dark:#0b4d48;
--light:#fff;
}

.login-page{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f766e,#16a34a);
}

.login-box{
background:white;
padding:40px;
border-radius:15px;
width:360px;
}

.login-box input{
width:100%;
padding:14px;
margin:10px 0;
border-radius:8px;
border:1px solid #ddd;
}

button{
padding:12px 18px;
background:var(--primary);
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.dashboard{display:none;height:100vh;}

.sidebar{
width:250px;
background:var(--primary);
color:white;
position:fixed;
top:0;bottom:0;left:0;
padding:20px;
}

.sidebar li{padding:12px;cursor:pointer;}
.sidebar li:hover{background:rgba(255,255,255,.2);}

.main{margin-left:250px;padding:20px;}

.section{display:none;}
.section.active{display:block;}

.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}

.card{background:#fff;padding:20px;border-radius:10px;}

table{width:100%;margin-top:20px;border-collapse:collapse;}

td,th{padding:10px;border-bottom:1px solid #ddd;}

.gallery img{width:120px;height:100px;object-fit:cover;}

</style>
</head>

<body>

<!-- LOGIN -->
<div class="login-page" id="loginPage">
<div class="login-box">
<h2>Admin Login</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button id="loginBtn">Login</button>
<p id="loginStatus"></p>
</div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">

<div class="sidebar">
<h2>BRENDAVA</h2>
<ul>
<li onclick="showSection('home')">Dashboard</li>
<li onclick="showSection('gallery')">Gallery</li>
<li onclick="showSection('videos')">Videos</li>
<li onclick="showSection('reviews')">Reviews</li>
<li onclick="showSection('bookings')">Bookings</li>
<li onclick="showSection('messages')">Messages</li>
<li onclick="logout()">Logout</li>
</ul>
</div>

<div class="main">

<div class="cards">
<div class="card">Gallery <div id="galleryCount">0</div></div>
<div class="card">Videos <div id="videoCount">0</div></div>
<div class="card">Reviews <div id="reviewCount">0</div></div>
<div class="card">Bookings <div id="bookingCount">0</div></div>
</div>

<!-- SECTIONS -->
<div id="home" class="section active"><h2>Dashboard</h2></div>

<div id="gallery" class="section">
<h2>Gallery</h2>
<input type="file" id="photo">
<input id="photoTitle" placeholder="Title">
<button id="uploadPhoto">Upload</button>
<div id="galleryList"></div>
</div>

<div id="videos" class="section">
<h2>Videos</h2>
<input type="file" id="video">
<input id="videoTitle">
<button id="uploadVideo">Upload</button>
<div id="videoList"></div>
</div>

<div id="reviews" class="section">
<h2>Reviews</h2>
<table><tbody id="reviewTable"></tbody></table>
</div>

<div id="bookings" class="section">
<h2>Bookings</h2>
<table><tbody id="bookingTable"></tbody></table>
</div>

<div id="messages" class="section">
<h2>Messages</h2>
<table><tbody id="messageTable"></tbody></table>
</div>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth,signInWithEmailAndPassword,signOut,onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore,collection,addDoc,getDocs,deleteDoc,doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getStorage,ref,uploadBytes,getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const firebaseConfig={
apiKey:"YOUR_API_KEY",
authDomain:"YOUR_PROJECT.firebaseapp.com",
projectId:"YOUR_PROJECT_ID",
storageBucket:"YOUR_PROJECT.appspot.com",
messagingSenderId:"YOUR_SENDER_ID",
appId:"YOUR_APP_ID"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);
const storage=getStorage(app);

// LOGIN
loginBtn.onclick=()=>{
signInWithEmailAndPassword(auth,email.value,password.value)
.then(()=>loginStatus.innerText="Success")
.catch(e=>loginStatus.innerText=e.message);
};

onAuthStateChanged(auth,user=>{
if(user){
loginPage.style.display="none";
dashboard.style.display="flex";
loadAll();
}else{
loginPage.style.display="flex";
dashboard.style.display="none";
}
});

window.logout=()=>signOut(auth);

// NAV
window.showSection=(id)=>{
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
};

// COLLECTIONS
const gRef=collection(db,"gallery");
const vRef=collection(db,"videos");
const rRef=collection(db,"reviews");
const bRef=collection(db,"bookings");
const mRef=collection(db,"messages");

// UPLOAD IMAGE
uploadPhoto.onclick=async()=>{
const file=photo.files[0];
const storageRef=ref(storage,"gallery/"+file.name);
await uploadBytes(storageRef,file);
const url=await getDownloadURL(storageRef);
await addDoc(gRef,{title:photoTitle.value,imageUrl:url});
loadGallery();
};

// LOAD GALLERY
async function loadGallery(){
const snap=await getDocs(gRef);
galleryList.innerHTML="";
snap.forEach(d=>{
galleryList.innerHTML+=`<img src="${d.data().imageUrl}">`;
});
galleryCount.innerText=snap.size;
}

// VIDEO
uploadVideo.onclick=async()=>{
const file=video.files[0];
const storageRef=ref(storage,"videos/"+file.name);
await uploadBytes(storageRef,file);
const url=await getDownloadURL(storageRef);
await addDoc(vRef,{title:videoTitle.value,videoUrl:url});
loadVideos();
};

async function loadVideos(){
const snap=await getDocs(vRef);
videoList.innerHTML="";
snap.forEach(d=>{
videoList.innerHTML+=`<video width="120" controls src="${d.data().videoUrl}"></video>`;
});
videoCount.innerText=snap.size;
}

// REVIEWS
async function loadReviews(){
const snap=await getDocs(rRef);
reviewTable.innerHTML="";
snap.forEach(d=>{
reviewTable.innerHTML+=`<tr><td>${d.data().review}</td></tr>`;
});
reviewCount.innerText=snap.size;
}

// BOOKINGS
async function loadBookings(){
const snap=await getDocs(bRef);
bookingTable.innerHTML="";
snap.forEach(d=>{
bookingTable.innerHTML+=`<tr><td>${d.data().name}</td></tr>`;
});
bookingCount.innerText=snap.size;
}

// MESSAGES
async function loadMessages(){
const snap=await getDocs(mRef);
messageTable.innerHTML="";
snap.forEach(d=>{
messageTable.innerHTML+=`<tr><td>${d.data().message}</td></tr>`;
});
}

// LOAD ALL
function loadAll(){
loadGallery();
loadVideos();
loadReviews();
loadBookings();
loadMessages();
}

</script>

</body>
</html>
