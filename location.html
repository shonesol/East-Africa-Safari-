<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Location Map</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#f5f5f5;
}

.location{
    max-width:900px;
    margin:50px auto;
    padding:20px;
}

.location h2{
    text-align:center;
    color:#2c3e50;
    margin-bottom:10px;
}

.location p{
    text-align:center;
    color:#666;
    margin-bottom:20px;
    font-size:16px;
}

.map{
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 8px 20px rgba(0,0,0,.15);
}

.map iframe{
    width:100%;
    height:450px;
    border:0;
}
    #map {
    width: 100%;
    height: 450px;
    border-radius: 15px;
    overflow: hidden;
}
</style>

</head>
<body>

<section class="location">
    <h2>Our Location</h2>
    <p>Bukoto, Mukalazi Road, Near Kampala International School, Kampala, Uganda</p>

    <div class="map">
        <iframe
            src="https://www.google.com/maps?q=Bukoto,+Mukalazi+Road,+Near+Kampala+International+School,+Kampala,+Uganda&output=embed"
            allowfullscreen
            loading="lazy">
        </iframe>
    </div>
</section>
<div id="map"></div>

<script>
function initMap() {
    const location = {
        lat: 0.3476, // Replace with the exact latitude
        lng: 32.5946 // Replace with the exact longitude
    };

    const map = new google.maps.Map(document.getElementById("map"), {
        zoom: 16,
        center: location,
    });

    new google.maps.Marker({
        position: location,
        map: map,
        title: "World Blossom Safaris\nBukoto, Mukalazi Road, Near Kampala International School, Uganda"
    });
}
</script>

<script async
    src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initMap">
</script>
</body>
</html>
