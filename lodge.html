<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brendava Tours and Travel</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, sans-serif;
}

body{
  background: linear-gradient(135deg,#e8f5e9,#f1f8e9);
}

/* HEADER */
header{
  background: linear-gradient(90deg,#1b5e20,#43a047);
  color:white;
  text-align:center;
  padding:25px;
}

header h1{
  font-size:30px;
}

.home-btn{
  display:inline-block;
  margin-top:10px;
  padding:10px 20px;
  background:#00c853;
  color:white;
  border-radius:25px;
  text-decoration:none;
  font-weight:bold;
}

/* CONTAINER */
.container{
  width:95%;
  margin:auto;
  padding:20px 0;
}

/* PARK SECTION */
.country-title{
  background:#2e7d32;
  color:white;
  padding:12px;
  margin-top:30px;
  border-radius:10px;
  font-size:20px;
}

/* PARK GRID */
.parks{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:20px;
  margin-top:15px;
}

/* PARK CARD */
.park{
  background:white;
  border-radius:15px;
  padding:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.15);
  transition:0.3s;
}

.park:hover{
  transform:translateY(-5px);
}

.park h3{
  color:#1b5e20;
  margin-bottom:10px;
}

/* LODGES */
.lodge{
  background:linear-gradient(90deg,#e8f5e9,#c8e6c9);
  margin:6px 0;
  padding:10px;
  border-radius:10px;
  transition:0.3s;
}

.lodge:hover{
  background:#a5d6a7;
  transform:scale(1.02);
}

/* FOOTER */
footer{
  background:#1b5e20;
  color:white;
  text-align:center;
  padding:20px;
  margin-top:40px;
}
</style>
</head>

<body>

<header>
  <h1>Brendava Tours and Travel</h1>
  <p>Explore East Africa’s Top Safari Parks & Luxury Lodges</p>
  <a href="#" class="home-btn">🏠 Back to Home</a>
</header>

<div class="container">

<!-- ===== PARKS SECTION ===== -->

<div class="country-title">Kenya</div>
<div class="parks" id="kenya"></div>

<div class="country-title">Tanzania</div>
<div class="parks" id="tanzania"></div>

<div class="country-title">Uganda</div>
<div class="parks" id="uganda"></div>

<div class="country-title">Rwanda</div>
<div class="parks" id="rwanda"></div>

</div>

<footer>
© 2026 Brendava Tours and Travel
</footer>

<script>

const parks = {
  kenya: [
    "Maasai Mara","Amboseli","Lake Nakuru"
  ],
  tanzania: [
    "Serengeti","Ngorongoro","Tarangire"
  ],
  uganda: [
    "Murchison Falls","Queen Elizabeth","Bwindi"
  ],
  rwanda: [
    "Volcanoes","Akagera","Nyungwe"
  ]
};

// 4 REALISTIC LODGES PER PARK
function lodges(park){
  return [
    `🏡 ${park} Safari Lodge`,
    `🌿 ${park} View Camp`,
    `⭐ ${park} Luxury Resort`,
    `🔥 ${park} Wilderness Lodge`
  ];
}

function render(id, list){
  const container = document.getElementById(id);

  list.forEach(park=>{
    const div = document.createElement("div");
    div.className = "park";

    div.innerHTML = `
      <h3>🏞 ${park} National Park</h3>
      ${lodges(park).map(l=>`<div class="lodge">${l}</div>`).join("")}
    `;

    container.appendChild(div);
  });
}

render("kenya", parks.kenya);
render("tanzania", parks.tanzania);
render("uganda", parks.uganda);
render("rwanda", parks.rwanda);

</script>

</body>
</html>
